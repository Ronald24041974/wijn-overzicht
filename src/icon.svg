<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="bowl">
      <path d="M248 308 C230 306 175 278 175 228 C175 178 192 125 193 105 L319 105 C320 125 337 178 337 228 C337 278 282 306 264 308 Z"/>
    </clipPath>
  </defs>

  <!-- Achtergrond -->
  <rect width="512" height="512" rx="96" fill="#1b3a34"/>

  <!-- Decoratieve ring -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="#c8972a" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="207" fill="none" stroke="#f2c36b" stroke-width="0.8" opacity="0.4"/>

  <!-- Druiventros links -->
  <g fill="#c8972a">
    <line x1="150" y1="205" x2="150" y2="218" stroke="#c8972a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M150 205 C137 187 119 185 121 199 C131 194 142 198 150 205 Z"/>
    <path d="M150 205 C163 187 181 185 179 199 C169 194 158 198 150 205 Z"/>
    <circle cx="140" cy="227" r="11"/>
    <circle cx="162" cy="227" r="11"/>
    <circle cx="129" cy="246" r="11"/>
    <circle cx="151" cy="246" r="11"/>
    <circle cx="173" cy="246" r="11"/>
    <circle cx="140" cy="265" r="11"/>
    <circle cx="162" cy="265" r="11"/>
    <circle cx="151" cy="284" r="11"/>
  </g>

  <!-- Druiventros rechts (gespiegeld) -->
  <g fill="#c8972a">
    <line x1="362" y1="205" x2="362" y2="218" stroke="#c8972a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M362 205 C349 187 331 185 333 199 C343 194 354 198 362 205 Z"/>
    <path d="M362 205 C375 187 393 185 391 199 C381 194 370 198 362 205 Z"/>
    <circle cx="350" cy="227" r="11"/>
