    <circle cx="339" cy="246" r="11"/>
    <circle cx="361" cy="246" r="11"/>
    <circle cx="383" cy="246" r="11"/>
    <circle cx="350" cy="265" r="11"/>
    <circle cx="372" cy="265" r="11"/>
    <circle cx="361" cy="284" r="11"/>
  </g>

  <!-- Wijn in de kelk -->
  <rect x="150" y="230" width="212" height="85" fill="#7a1a2e" clip-path="url(#bowl)" opacity="0.9"/>
  <ellipse cx="256" cy="230" rx="72" ry="7" fill="#9b2535" clip-path="url(#bowl)" opacity="0.75"/>

  <!-- Kelk (subtiele vulling + omtrek) -->
  <path d="M248 308 C230 306 175 278 175 228 C175 178 192 125 193 105 L319 105 C320 125 337 178 337 228 C337 278 282 306 264 308 Z" fill="#f2c36b" opacity="0.05"/>
  <path d="M248 308 C230 306 175 278 175 228 C175 178 192 125 193 105 L319 105 C320 125 337 178 337 228 C337 278 282 306 264 308 Z" fill="none" stroke="#f2c36b" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Glinstering glas -->
  <path d="M204 128 C199 162 197 198 203 228" stroke="rgba(255,255,255,0.18)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Steel -->
  <line x1="256" y1="308" x2="256" y2="393" stroke="#f2c36b" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Voet -->
  <path d="M207 394 Q256 384 305 394" stroke="#f2c36b" stroke-width="5.5" stroke-linecap="round" fill="none"/>
</svg>
